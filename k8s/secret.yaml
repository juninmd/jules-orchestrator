# Preencha os valores abaixo com base64 antes de aplicar:
#   echo -n "seu_valor" | base64
#
# Ou use: kubectl create secret generic jules-orchestrator-secrets \
#   --namespace=jules-orchestrator \
#   --from-literal=GITHUB_TOKEN=ghp_... \
#   --from-literal=JULES_API_KEY=... \
#   --from-literal=TELEGRAM_BOT_TOKEN=... \
#   --from-literal=TELEGRAM_CHAT_ID=...
apiVersion: v1
kind: Secret
metadata:
  name: jules-orchestrator-secrets
  namespace: jules-orchestrator
type: Opaque
data:
  GITHUB_TOKEN: ""        # base64(ghp_...)
  JULES_API_KEY: ""       # base64(sua_chave)
  TELEGRAM_BOT_TOKEN: ""  # base64(token) — opcional
  TELEGRAM_CHAT_ID: ""    # base64(chat_id) — opcional
