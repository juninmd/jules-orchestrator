apiVersion: batch/v1
kind: CronJob
metadata:
  name: jules-orchestrator
  namespace: jules-orchestrator
spec:
  # Autopilot completo a cada hora
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # exit 2 = retryable; backoffLimit permite 1 retry automático
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        spec:
          serviceAccountName: jules-orchestrator
          restartPolicy: OnFailure
          containers:
            - name: orchestrator
              image: ghcr.io/juninmd/jules-orchestrator:latest
              imagePullPolicy: Always
              env:
                - name: JOB_NAME
                  value: "autopilot"
                - name: OLLAMA_HOST
                  value: "http://ollama.ollama.svc.cluster.local:11434"
                - name: OLLAMA_MODEL
                  value: "gemma2"
                - name: OLLAMA_TIMEOUT_MS
                  value: "300000"
                - name: JULES_API_URL
                  value: "https://jules.googleapis.com/v1alpha/sessions"
                - name: ORCHESTRATOR_STATE_DIR
                  value: "/data/orchestrator-state"
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: jules-orchestrator-secrets
                      key: GITHUB_TOKEN
                - name: JULES_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: jules-orchestrator-secrets
                      key: JULES_API_KEY
                - name: TELEGRAM_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: jules-orchestrator-secrets
                      key: TELEGRAM_BOT_TOKEN
                      optional: true
                - name: TELEGRAM_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: jules-orchestrator-secrets
                      key: TELEGRAM_CHAT_ID
                      optional: true
              volumeMounts:
                - name: state
                  mountPath: /data/orchestrator-state
              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: jules-orchestrator-state
