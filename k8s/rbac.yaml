apiVersion: v1
kind: ServiceAccount
metadata:
  name: jules-orchestrator
  namespace: jules-orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jules-orchestrator
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jules-orchestrator
subjects:
  - kind: ServiceAccount
    name: jules-orchestrator
    namespace: jules-orchestrator
roleRef:
  kind: ClusterRole
  name: jules-orchestrator
  apiGroup: rbac.authorization.k8s.io
